export default "<div>\n    <div x-html=\"nav\"></div>\n    <div x-html=\"aside\"></div>\n    <main class=\"bg-gray-50 min-h-screen p-4 lg:ml-64 h-auto pt-20\">\n        <template x-if=\"loading\">\n            <img loading=\"lazy\" width=\"24\" height=\"24\" src=\"/loading.gif\" alt=\"loading\" class=\"mx-auto\">\n        </template>\n        <template x-if=\"!loading\">\n            <img src=\"/img/ISIParts logo home.png\" loading=\"lazy\" alt=\"isiparts\" class=\"w-full max-w-md mx-auto\">\n        </template>\n    </main>\n</div>\n"
